name: Build Windows 11 LTSC 2024 ISO

on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Direct download URL for LTSC 2024 base ISO (see massgrave.dev/windows_ltsc_links)'
        type: string
        required: true
      language:
        description: 'Language code (e.g., en-us, zh-cn)'
        type: string
        default: 'en-us'
      drivers_url:
        description: 'URL to drivers zip (optional, must contain OS/ ALL/ or WinPE/ subfolders with .inf drivers)'
        type: string
        default: ''

jobs:
  build-iso:
    runs-on: windows-2022
    timeout-minutes: 300
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download base LTSC ISO
        shell: pwsh
        run: |
          $isoDir = "D:\base_iso"
          $isoPath = "$isoDir\ltsc.iso"
          $url = "${{ inputs.iso_url }}"
          New-Item -ItemType Directory -Path $isoDir -Force | Out-Null

          $ok = $false

          # 1) curl GET
          Write-Host "Downloading base LTSC ISO via curl..."
          curl.exe -L -f -o $isoPath $url 2>&1
          if ((Test-Path $isoPath) -and (Get-Item $isoPath).Length -gt 3GB) { $ok = $true }

          # 2) aria2c fallback
          if (-not $ok) {
              Write-Host "curl didn't work, trying aria2c..."
              Remove-Item $isoPath -Force -ErrorAction SilentlyContinue
              aria2c --max-connection-per-server=16 --split=16 -d $isoDir -o "ltsc.iso" $url
              if ((Test-Path $isoPath) -and (Get-Item $isoPath).Length -gt 3GB) { $ok = $true }
          }

          if (-not $ok) {
              Write-Error "Failed to download a valid ISO (file missing or smaller than 3 GB)"
              exit 1
          }

          $size = [math]::Round((Get-Item $isoPath).Length / 1GB, 2)
          Write-Host "Base ISO downloaded: ${size} GB"

      - name: Download converter
        shell: pwsh
        run: |
          $converterDir = "D:\converter"
          New-Item -ItemType Directory -Path $converterDir -Force | Out-Null

          $zipUrl = "https://github.com/abbodi1406/BatUtil/archive/refs/heads/master.zip"
          $zipPath = "D:\batutil.zip"
          Write-Host "Downloading abbodi1406/BatUtil..."
          aria2c --max-connection-per-server=16 --split=16 -d "D:\" -o "batutil.zip" $zipUrl

          Write-Host "Extracting converter..."
          7z x $zipPath -o"D:\batutil_extract" -y | Out-Null
          Copy-Item -Path "D:\batutil_extract\BatUtil-master\uup-converter-wimlib\*" -Destination $converterDir -Recurse -Force

          Remove-Item $zipPath -Force
          Remove-Item "D:\batutil_extract" -Recurse -Force
          Write-Host "Converter ready at $converterDir"

      - name: Download drivers
        if: inputs.drivers_url != ''
        shell: pwsh
        run: |
          $driversDir = "D:\drivers"
          $zipPath = "D:\drivers.zip"
          $url = "${{ inputs.drivers_url }}"
          New-Item -ItemType Directory -Path $driversDir -Force | Out-Null

          function Test-Archive($path) {
              if (-not (Test-Path $path)) { return $false }
              if ((Get-Item $path).Length -lt 4) { return $false }
              $h = [System.IO.File]::ReadAllBytes($path)[0..3]
              return (($h[0] -eq 0x50 -and $h[1] -eq 0x4B) -or ($h[0] -eq 0x37 -and $h[1] -eq 0x7A))
          }

          $ok = $false

          # 1) curl POST (temp file hosts like temp.sh serve files via POST)
          Write-Host "Trying curl POST..."
          curl.exe -L -f -X POST -o $zipPath $url 2>&1
          if (Test-Archive $zipPath) { $ok = $true }

          # 2) curl GET (direct download links, cloud storage, GitHub Releases, etc.)
          if (-not $ok) {
              Write-Host "POST didn't return a valid archive, trying curl GET..."
              Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
              curl.exe -L -f -o $zipPath $url 2>&1
              if (Test-Archive $zipPath) { $ok = $true }
          }

          # 3) aria2c GET (multi-connection fallback for large files)
          if (-not $ok) {
              Write-Host "curl GET didn't work either, trying aria2c..."
              Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
              aria2c --max-connection-per-server=16 --split=16 -d "D:\" -o "drivers.zip" $url
              if (Test-Archive $zipPath) { $ok = $true }
          }

          if (-not $ok) {
              Write-Error "Failed to download a valid archive from $url (all methods tried)"
              exit 1
          }

          Write-Host "Extracting drivers..."
          7z x $zipPath -o"$driversDir" -y
          Remove-Item $zipPath -Force
          Write-Host "Drivers extracted to $driversDir"
          Get-ChildItem $driversDir -Recurse -Filter "*.inf" | ForEach-Object { Write-Host "  Found: $($_.FullName)" }

      - name: Integrate latest cumulative update
        id: integrate
        shell: pwsh
        run: |
          $params = @{
            BaseIsoPath  = "D:\base_iso\ltsc.iso"
            ConverterDir = "D:\converter"
            WorkDir      = "D:\update_work"
          }
          if (Test-Path "D:\drivers") {
            $params.DriversDir = "D:\drivers"
          }
          .\scripts\integrate-ltsc-update.ps1 @params

      - name: Split ISO with 7z
        id: split
        shell: pwsh
        run: |
          $outputDir = "D:\output"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          $iso = Get-ChildItem "D:\converter\*.iso" | Select-Object -First 1
          if (-not $iso) {
            Write-Error "No ISO file found in D:\converter\"
            exit 1
          }

          $name = $iso.BaseName
          Write-Host "Splitting $($iso.Name) into 1.9 GB parts..."
          7z a -v1900m -mx=0 "$outputDir\$name.7z" $iso.FullName

          $partCount = (Get-ChildItem "$outputDir\*.7z.*").Count
          Write-Host "Created $partCount parts"

          echo "iso_name=$name" >> $env:GITHUB_OUTPUT
          echo "iso_filename=$($iso.Name)" >> $env:GITHUB_OUTPUT

      - name: Generate checksums
        id: checksums
        shell: pwsh
        run: |
          $iso = Get-ChildItem "D:\converter\*.iso" | Select-Object -First 1
          $checksumFile = "D:\output\checksums.sha256"

          $isoHash = (Get-FileHash $iso.FullName -Algorithm SHA256).Hash
          "$isoHash  $($iso.Name)" | Out-File -FilePath $checksumFile -Encoding utf8

          Get-ChildItem "D:\output\*.7z.*" | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Add-Content -Path $checksumFile -Encoding utf8
          }

          Write-Host "Checksums:"
          Get-Content $checksumFile

          echo "iso_hash=$isoHash" >> $env:GITHUB_OUTPUT
          echo "iso_filename=$($iso.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.integrate.outputs.patched_version }}-amd64-${{ inputs.language }}-LTSC"
          name: "Windows 11 LTSC 2024 (${{ steps.integrate.outputs.patched_version }}) (amd64, ${{ inputs.language }})"
          body: |
            ## Windows 11 LTSC 2024 Build Info
            - **Update:** ${{ steps.integrate.outputs.update_title }}
            - **Patched Version:** ${{ steps.integrate.outputs.patched_version }}
            - **Architecture:** amd64
            - **Language:** ${{ inputs.language }}
            - **Editions:** ${{ steps.integrate.outputs.editions }}
            - **Options:** Latest CU integrated, Drivers integrated, Component cleanup
            - **Base ISO:** LTSC 2024 (26100.1742)

            ## How to Extract
            Download all `.7z.xxx` files to the same folder, then run:
            ```
            7z x ${{ steps.split.outputs.iso_name }}.7z.001
            ```

            ## Checksums (SHA256)
            ```
            ${{ steps.checksums.outputs.iso_hash }}  ${{ steps.checksums.outputs.iso_filename }}
            ```
          files: |
            D:/output/*.7z.*
            D:/output/checksums.sha256
